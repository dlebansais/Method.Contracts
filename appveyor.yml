# version format
version: v{build}

branches:
  only:
    - master
    - deployment

# Do not build on tags
skip_tags: true

# Skipping commits with particular message or from specific user
skip_commits:
  message: "*[skip ci]*"

image: Visual Studio 2026

# scripts that are called at very beginning, before repo cloning
init:
  - git config --global core.autocrlf input

environment:
# value: <password to decrypt snk file>
  SnkPassword:
    secure: 1svE5KENguPZZA9WI7jqI4rFGWREjMTmt//xbbv+POFKS8BdTi/TE2zB7jU0e7BsYW8G1ZP/4NxjfvnM/EOuH/VxpbyUo8p6fayCu3fDKbLBAt7PWIRCy4mo7SWR0vHAw/Q6cFQHWfA7EVu7eVC66Q==
  opencover_version: 4.7.1221
  codecov_uploader_version: 0.8.0
  report_generator_version: 5.5.10
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PACKAGE_PREFIX: dlebansais

matrix:
# set this flag to immediately finish build once one of the jobs fails.
  fast_finish: true

before_build:
  - nuget restore %APPVEYOR_PROJECT_NAME%.slnx
  - nuget install dlebansais.GitCommitId -DependencyVersion Highest -OutputDirectory packages
  - nuget install dlebansais.Packager -DependencyVersion Highest -OutputDirectory packages
  - nuget install OpenCover -Version %opencover_version% -OutputDirectory packages
  - nuget install CodecovUploader -Version %codecov_uploader_version% -OutputDirectory packages
  - nuget install ReportGenerator -Version %report_generator_version% -OutputDirectory packages
  - dotnet tool install -g dotnet-stryker
  - dotnet restore
# Extract signing.snk to the current directory. Do not extract for a PR because they don't have access to secrets, but we don't need to sign assemblies in that case.
  - if '%APPVEYOR_PULL_REQUEST_NUMBER%'=='' C:/PROGRA~1/7-Zip/7z.exe e -p%SnkPassword% .signing\key.zip > nul

configuration:
  - Release
  - Debug

build:
  project: $(APPVEYOR_PROJECT_NAME).slnx

after_build:
  - ps: |
      $folder = Get-ChildItem -Path packages/dlebansais.Packager.* -Name | Out-String    # Get the installation folder (we don't know the actual version)
      $firstline = ($folder -split '\r\n')[0]                                            # Get rid of carriage-return
      $fullpath = ".\packages\$firstline\tools\net10.0-windows7.0\Packager.exe"          # Build full path
      if ($env:CONFIGURATION -eq 'Release') {
        & $fullpath $env:CUSTOM_PACKAGER_OPTIONS --prefix=$env:PACKAGE_PREFIX            # Execute the packager: the output is nuget\%PACKAGE_PREFIX%.%APPVEYOR_PROJECT_NAME%.nuspec
        if ($LastExitCode -lt 0) { exit 1 }
        nuget pack "nuget\$env:PACKAGE_PREFIX.$env:APPVEYOR_PROJECT_NAME.nuspec"
      } else {
        & $fullpath $env:CUSTOM_PACKAGER_OPTIONS --prefix=$env:PACKAGE_PREFIX --debug    # Execute the packager: the output is nuget-debug\%PACKAGE_PREFIX%.%APPVEYOR_PROJECT_NAME%-Debug.nuspec
        if ($LastExitCode -lt 0) { exit 1 }
        nuget pack "nuget-debug\$env:PACKAGE_PREFIX.$env:APPVEYOR_PROJECT_NAME-Debug.nuspec"
      }
      $xml = [xml](Get-Content .\$env:APPVEYOR_PROJECT_NAME\$env:APPVEYOR_PROJECT_NAME.csproj)
      $version=$xml.Project.PropertyGroup.Version
      set version_tag v$version
      $version_tag=$version_tag.Trim()
      $env:VERSION_TAG=$version_tag
  - echo Version is "%VERSION_TAG%"

before_test:
  - |-
    printf "pushd .\Test\%APPVEYOR_PROJECT_NAME%.Test && dotnet test --test-modules ./bin/x64/%CONFIGURATION%/net10.0/%APPVEYOR_PROJECT_NAME%.Test.dll --output:detailed && popd\n" > run-tests.bat
    printf "pushd .\Test\%APPVEYOR_PROJECT_NAME%.Test.DotNetFramework && dotnet test ./bin/x64/%CONFIGURATION%/net481/%APPVEYOR_PROJECT_NAME%.Test.DotNetFramework.dll -l console;verbosity=detailed && popd\n" >> run-tests.bat
  - |-
    printf "@echo ************************************************************** Starting Tests..\n" > run-tests1.bat
    printf "call run-tests.bat\n" >> run-tests1.bat
  - |-
    printf ".\packages\OpenCover.%opencover_version%\Tools\OpenCover.Console.exe -register:user -returntargetcode -target:\x25\x31 -mergeoutput -output:""Coverage-%APPVEYOR_PROJECT_NAME%.xml""\n" > opencover.bat
  - |-
    printf ".\packages\CodecovUploader.%codecov_uploader_version%\Tools\Codecov.exe -f ""Coverage-%APPVEYOR_PROJECT_NAME%.xml""\n" > after-test.bat
    printf ".\packages\ReportGenerator.%report_generator_version%\Tools\Net8.0\ReportGenerator.exe ""-reports:Coverage-%APPVEYOR_PROJECT_NAME%.xml"" -targetdir:.\CoverageReports ""-assemblyfilters:-Microsoft*;+%APPVEYOR_PROJECT_NAME%"" ""-filefilters:-*.g.cs"" -reporttypes:textsummary\n" >> after-test.bat
    printf "powershell $ErrorActionPreference = 'Stop'; $opencover_summary = Get-Content .\CoverageReports\Summary.txt -Raw ; Write-Output $opencover_summary ; $pattern = 'Branch coverage' + [char]0x003A + ' 100' + [char]0x0025 ; if ($opencover_summary -NotMatch $pattern) { exit -1 }\n" >> after-test.bat
    printf "cd ./Test/%APPVEYOR_PROJECT_NAME%.Test\n" >> after-test.bat
    printf "dotnet stryker --configuration:%CONFIGURATION% --output . --reporter ""markdown""\n" >> after-test.bat
    printf "powershell $ErrorActionPreference = 'Stop'; $stryker_summary = Get-Content ./reports/mutation-report.md -Raw ; Write-Output $stryker_summary ; $pattern = 'The final mutation score is 100' ; if ($stryker_summary -NotMatch $pattern) { exit -1 }\n" >> after-test.bat

test_script:
  - if '%APPVEYOR_REPO_BRANCH%' == 'master' call opencover.bat run-tests1.bat

after_test:
  - if '%APPVEYOR_REPO_BRANCH%' == 'master' call after-test.bat

artifacts:
  - path: $(PACKAGE_PREFIX).$(APPVEYOR_PROJECT_NAME)-Debug.*.nupkg
    name: $(APPVEYOR_PROJECT_NAME)-Package-Debug
  - path: $(PACKAGE_PREFIX).$(APPVEYOR_PROJECT_NAME).*.nupkg
    name: $(APPVEYOR_PROJECT_NAME)-Package-Release

deploy:
  - provider: GitHub
    release: $(VERSION_TAG)
    description: 'Automatic deployment'
    auth_token:
      secure: wGFKd2yoaaq7+B6Evl2OZeePPHUzTDlYnDf7DCH26mJZc/nrYGjQ5XGiTZfTWmvW
    artifact: $(APPVEYOR_PROJECT_NAME)-Package-Release
    draft: false
    prerelease: false
    on:
      branch: deployment
      configuration: Release
  - provider: GitHub
    release: $(VERSION_TAG)
    description: 'Automatic deployment'
    auth_token:
      secure: wGFKd2yoaaq7+B6Evl2OZeePPHUzTDlYnDf7DCH26mJZc/nrYGjQ5XGiTZfTWmvW
    artifact: $(APPVEYOR_PROJECT_NAME)-Package-Debug
    draft: false
    prerelease: false
    on:
      branch: deployment
      configuration: Debug
  - provider: NuGet
    artifact: $(APPVEYOR_PROJECT_NAME)-Package-Release
    skip_symbols: true
    api_key:
      secure: nVIiaAk/COoMNi/OIDQ40dFBluznaIlKbpIUkxdA8HFxINY4YNkyis2sBjxByluw
    on:
      branch: deployment
      configuration: Release
  - provider: NuGet
    artifact: $(APPVEYOR_PROJECT_NAME)-Package-Debug
    symbol_server: https://api.nuget.org/v3/index.json
    api_key:
      secure: nVIiaAk/COoMNi/OIDQ40dFBluznaIlKbpIUkxdA8HFxINY4YNkyis2sBjxByluw
    on:
      branch: deployment
      configuration: Debug
  - provider: NuGet
    server: https://nuget.pkg.github.com/dlebansais/index.json
    symbol_server: https://nuget.pkg.github.com/dlebansais/index.json
    artifact: $(APPVEYOR_PROJECT_NAME)-Package-Debug
    username: dlebansais
    api_key:
      secure: 7DLdeObgZf+PG3CwBCFWr2UvW6IFBF4Lwa0SUxFeQbkWr6DJSwNPFDwuKXgX8Wfy
    on:
      branch: deployment
      configuration: Debug
  - provider: NuGet
    server: https://nuget.pkg.github.com/dlebansais/index.json
    artifact: $(APPVEYOR_PROJECT_NAME)-Package-Release
    skip_symbols: true
    username: dlebansais
    api_key:
      secure: 7DLdeObgZf+PG3CwBCFWr2UvW6IFBF4Lwa0SUxFeQbkWr6DJSwNPFDwuKXgX8Wfy
    on:
      branch: deployment
      configuration: Release
